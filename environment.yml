name: persian-mt
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8     # adjust to your CUDA version; remove for CPU-only setups
  - pip:
      # Core
      - transformers>=4.40
      - tokenizers
      - sentencepiece
      - datasets

      # Data and utilities
      - pandas
      - numpy
      - scikit-learn
      - tqdm
      - pyyaml

      # MT metrics (used by src/text_baseline/evaluate.py and csi_recall_metric.py)
      - sacrebleu
      - bert-score
      - unbabel-comet      # COMET
      - sacremoses

      # CSI tagger training (sequence labeling)
      - seqeval

# -----------------------------------------------------------------------------
# OPTIONAL: awesome-align for the lexicon construction step
# (only needed if you re-run src/csi_evaluation/extract_lexicon.py from scratch)
# Install separately, NOT a pip package:
#     git clone https://github.com/neulab/awesome-align.git
#     cd awesome-align
#     pip install -r requirements.txt
#     python setup.py install
# -----------------------------------------------------------------------------
